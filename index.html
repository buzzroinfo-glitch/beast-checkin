<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEAST CHECK-IN</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial,
    sans-serif;
  color:#fff;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#app{
  width:100%;
  max-width:520px;
  text-align:center;
  padding:40px;
  box-sizing:border-box;
}

/* ---------- 初期画面 ---------- */

.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:8px;
  line-height:1;
}

.subLogo{
  margin-top:12px;
  color:#00ff88;
  font-size:24px;
  letter-spacing:8px;
  line-height:1;
}

.checkinButton{

  margin-top:64px;

  width:320px;
  height:92px;

  border:none;
  border-radius:8px;

  background:
    linear-gradient(
      180deg,
      #2a2a2a 0%,
      #111 100%
    );

  color:#fff;

  font-size:34px;
  font-weight:900;
  letter-spacing:6px;

  box-shadow:
    0 10px 30px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -2px 0 rgba(0,0,0,.8);

  transition:.15s;
}

.checkinButton:active{

  transform:translateY(2px);

  box-shadow:
    0 4px 12px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(0,0,0,.9);
}

#status{
  margin-top:28px;
  color:#777;
  font-size:22px;
  letter-spacing:3px;
}

/* ---------- SUCCESS ---------- */

.successWrap{
  animation:fadeIn .35s ease;
}

.profileImage{

  width:320px;
  height:320px;

  border-radius:50%;
  object-fit:cover;

  border:8px solid #00ff88;

  box-shadow:
    0 0 25px #00ff88,
    0 0 80px rgba(0,255,136,.8);
}

.successText{

  margin-top:34px;

  color:#00ff88;

  font-size:28px;
  letter-spacing:8px;

  line-height:1;
}

.userName{

  margin-top:32px;

  font-size:68px;
  font-weight:900;

  line-height:1.1;

  text-align:center;
}

.welcome{

  margin-top:26px;

  font-size:34px;

  line-height:1.5;

  text-align:center;
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(12px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div id="app">

  <div id="mainView">

    <div class="logo">
      BEAST TOKYO
    </div>

    <div class="subLogo">
      CHECK-IN SYSTEM
    </div>

    <button
      class="checkinButton"
      onclick="checkIn()">

      CHECK-IN

    </button>

    <div id="status">
      LOADING...
    </div>

  </div>

</div>

<script>

const LIFF_ID =
"2010098806-OYFyyTQp";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxLnd_ViToNbyAVAmAuZH8Xmchru_KFQhla9U3mqBGR7qzUMb3nDnwKtpc5mg1PHwq-Fw/exec";

async function main(){

  const status =
    document.getElementById("status");

  try{

    status.innerText =
      "LIFF INIT...";

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

      status.innerText =
        "LOGIN...";

      liff.login();

      return;
    }

    status.innerText =
      "READY";

  }catch(e){

    status.innerText =
      "ERROR";

    console.error(e);

    alert(e.message);
  }
}

async function checkIn(){

  const status =
    document.getElementById("status");

  try{

    status.innerText =
      "CHECKING IN...";

    const profile =
      await liff.getProfile();

    await fetch(GAS_URL,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        userId:profile.userId,
        displayName:profile.displayName,
        pictureUrl:profile.pictureUrl,
        checkInDate:new Date().toISOString()

      })
    });

    showSuccess(profile);

    setTimeout(()=>{

      liff.closeWindow();

    },3000);

  }catch(e){

    console.error(e);

    status.innerText =
      "ERROR";

    alert(e.message);
  }
}

function showSuccess(profile){

  const app =
    document.getElementById("app");

  app.innerHTML = `

    <div class="successWrap">

      <img
        class="profileImage"
        src="${profile.pictureUrl}">

      <div class="successText">
        ACCESS GRANTED
      </div>

      <div class="userName">
        ${profile.displayName}様
      </div>

      <div class="welcome">
        BEAST TOKYOへ<br>
        ようこそ！
      </div>

    </div>
  `;
}

main();

</script>

</body>
</html>
