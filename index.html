<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEAST CHECK-IN</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#app{
  width:100%;
  max-width:560px;
  text-align:center;
  padding:40px;
  box-sizing:border-box;
}

.logo{
  font-size:54px;
  font-weight:900;
  letter-spacing:10px;
  white-space:nowrap;
  line-height:1;
}

.subLogo{
  margin-top:18px;
  color:#00ff88;
  font-size:22px;
  letter-spacing:9px;
  line-height:1;
}

.checkinButton{
  margin-top:90px;
  width:320px;
  height:86px;
  border-radius:4px;
  border:none;
  background:linear-gradient(180deg,#2c2c2c 0%,#080808 100%);
  color:#fff;
  font-size:28px;
  font-weight:900;
  letter-spacing:6px;
  box-shadow:
    0 10px 28px rgba(0,0,0,.85),
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -3px 0 rgba(0,0,0,.9);
}

.checkinButton:active{
  transform:translateY(2px);
}

#status{
  margin-top:30px;
  color:#666;
  font-size:18px;
  letter-spacing:4px;
}

.successWrap{
  animation:fadeIn .35s ease;
}

.profileImage{
  width:220px;
  height:220px;
  border-radius:50%;
  object-fit:cover;
  border:6px solid #00ff88;
  box-shadow:0 0 70px rgba(0,255,136,.9);
}

.successText{
  margin-top:34px;
  color:#00ff88;
  font-size:26px;
  letter-spacing:7px;
  line-height:1;
}

.userName{
  margin-top:30px;
  font-size:58px;
  font-weight:900;
  line-height:1.1;
}

.welcome{
  margin-top:30px;
  font-size:36px;
  line-height:1.45;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div id="app">

  <div id="mainView">

    <div class="logo">
      BEAST TOKYO
    </div>

    <div class="subLogo">
      CHECK-IN SYSTEM
    </div>

    <button class="checkinButton" onclick="checkIn()">
      CHECK-IN
    </button>

    <div id="status">
      LOADING...
    </div>

  </div>

</div>

<script>

const LIFF_ID =
"2010098806-OYFyyTQp";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxLnd_ViToNbyAVAmAuZH8Xmchru_KFQhla9U3mqBGR7qzUMb3nDnwKtpc5mg1PHwq-Fw/exec";

async function main(){

  const status = document.getElementById("status");

  try{

    status.innerText = "CONNECTING...";

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      status.innerText = "LOGIN...";
      liff.login();
      return;
    }

    status.innerText = "READY";

  }catch(e){
    status.innerText = "ERROR";
    console.error(e);
  }
}

async function checkIn(){

  const status = document.getElementById("status");

  try{

    status.innerText = "CHECKING IN...";

    const profile = await liff.getProfile();

    await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify({
        userId:profile.userId,
        displayName:profile.displayName,
        pictureUrl:profile.pictureUrl,
        checkInDate:new Date().toISOString()
      })
    });

    showSuccess(profile);

    setTimeout(()=>{
      liff.closeWindow();
    },3000);

  }catch(e){
    status.innerText = "ERROR";
    console.error(e);
  }
}

function showSuccess(profile){

  const app = document.getElementById("app");

  app.innerHTML = `

    <div class="successWrap">

      <img
        class="profileImage"
        src="${profile.pictureUrl}"
      >

      <div class="successText">
        ACCESS GRANTED
      </div>

      <div class="userName">
        ${profile.displayName}様
      </div>

      <div class="welcome">
        BEAST TOKYOへ<br>
        ようこそ！
      </div>

    </div>
  `;
}

main();

</script>

</body>
</html>
