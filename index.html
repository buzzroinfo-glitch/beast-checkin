<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEAST CHECK-IN</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;

  width:100%;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
}

.container{
  width:100%;
  padding:40px;

  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:8px;

  margin-bottom:8px;
}

.subLogo{
  font-size:18px;
  letter-spacing:10px;

  color:#00ff88;

  margin-bottom:80px;
}

button{

  width:280px;
  height:82px;

  border:1px solid rgba(255,255,255,0.15);

  border-radius:10px;

  background:
    linear-gradient(
      180deg,
      #1a1a1a 0%,
      #050505 100%
    );

  color:#fff;

  font-size:26px;
  font-weight:700;
  letter-spacing:4px;

  cursor:pointer;

  transition:0.25s;

  box-shadow:
    0 0 20px rgba(255,255,255,0.05),
    inset 0 0 0 1px rgba(255,255,255,0.04);
}

button:hover{

  transform:translateY(-2px);

  background:
    linear-gradient(
      180deg,
      #222 0%,
      #000 100%
    );

  box-shadow:
    0 0 30px rgba(255,255,255,0.12);
}

button:active{
  transform:scale(0.98);
}

#status{
  margin-top:26px;

  color:#777;

  font-size:18px;
  letter-spacing:3px;
}

.successBox{

  display:flex;
  flex-direction:column;
  align-items:center;

  animation:fadeIn 0.5s ease;
}

.profileImage{

  width:120px;
  height:120px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid #00ff88;

  box-shadow:
    0 0 40px #00ff88;
}

.successText{

  margin-top:24px;

  color:#00ff88;

  font-size:20px;
  letter-spacing:5px;
}

.userName{

  margin-top:18px;

  font-size:48px;
  font-weight:900;

  text-align:center;
}

.welcome{

  margin-top:24px;

  font-size:32px;
  line-height:1.7;

  text-align:center;
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <div id="mainView">

    <div class="logo">
      BEAST TOKYO
    </div>

    <div class="subLogo">
      CHECK-IN SYSTEM
    </div>

    <button onclick="checkIn()">
      CHECK-IN
    </button>

    <p id="status">
      LOADING...
    </p>

  </div>

  <div id="successView" style="display:none;">

  </div>

</div>

<script>

const LIFF_ID =
"2010098806-OYFyyTQp";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxLnd_ViToNbyAVAmAuZH8Xmchru_KFQhla9U3mqBGR7qzUMb3nDnwKtpc5mg1PHwq-Fw/exec";

async function main(){

  const status =
    document.getElementById("status");

  try{

    status.innerText =
      "LIFF INIT...";

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

      status.innerText =
        "LOGIN...";

      liff.login();

      return;
    }

    status.innerText =
      "READY";

  }catch(e){

    status.innerText =
      "ERROR";

    console.error(e);
  }
}

async function checkIn(){

  const status =
    document.getElementById("status");

  status.innerText =
    "CHECKING IN...";

  try{

    const profile =
      await liff.getProfile();

    await fetch(GAS_URL,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        userId:profile.userId,
        displayName:profile.displayName,
        pictureUrl:profile.pictureUrl,
        checkInDate:new Date().toISOString()

      })
    });

    showSuccess(profile);

  }catch(e){

    status.innerText =
      "ERROR";

    alert(e.message);

    console.error(e);
  }
}

function showSuccess(profile){

  document.getElementById("mainView")
    .style.display = "none";

  const successView =
    document.getElementById("successView");

  successView.style.display = "block";

  successView.innerHTML = `

    <div class="successBox">

      <img
        class="profileImage"
        src="${profile.pictureUrl}"
      >

      <div class="successText">
        ACCESS GRANTED
      </div>

      <div class="userName">
        ${profile.displayName}様
      </div>

      <div class="welcome">
        BEAST TOKYOへ<br>
        ようこそ！
      </div>

    </div>
  `;
}

main();

</script>

</body>
</html>
