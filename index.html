<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEAST CHECK-IN</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.container{

  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;
}

.logo{

  font-size:54px;
  font-weight:900;

  letter-spacing:8px;

  margin-bottom:12px;
}

.sub{

  color:#00ff66;

  letter-spacing:8px;

  font-size:14px;

  margin-bottom:80px;

  text-shadow:
    0 0 10px #00ff66;
}

button{

  width:260px;
  height:82px;

  border:none;
  border-radius:999px;

  background:#fff;
  color:#000;

  font-size:28px;
  font-weight:bold;

  cursor:pointer;

  animation:pulse 2s infinite;

  transition:0.3s;
}

button:hover{

  transform:scale(1.05);
}

#status{

  margin-top:28px;

  color:#777;

  letter-spacing:3px;

  font-size:15px;
}

#success{

  position:fixed;
  inset:0;

  background:#000;

  display:none;

  justify-content:center;
  align-items:center;

  flex-direction:column;

  text-align:center;

  z-index:999;
}

.profileImage{

  width:140px;
  height:140px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid #00ff66;

  box-shadow:
    0 0 30px #00ff66,
    0 0 60px #00ff66;

  margin-bottom:36px;

  animation:fadeUp 1s ease;
}

.access{

  color:#00ff66;

  font-size:24px;
  font-weight:900;

  letter-spacing:6px;

  margin-bottom:24px;

  text-shadow:
    0 0 12px #00ff66;

  animation:fadeUp 1.2s ease;
}

.name{

  font-size:52px;
  font-weight:900;

  margin-bottom:40px;

  padding:14px 34px;

  border-radius:999px;

  background:
    rgba(255,255,255,0.05);

  animation:fadeUp 1.4s ease;
}

.welcome{

  text-align:center;

  line-height:1.8;

  font-size:34px;

  animation:fadeUp 1.6s ease;
}

.greenGlow{

  position:absolute;

  bottom:120px;

  width:220px;
  height:20px;

  border-radius:999px;

  background:#00ff66;

  filter:blur(18px);

  opacity:0.8;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.04);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(24px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    BEAST TOKYO
  </div>

  <div class="sub">
    CHECK-IN SYSTEM
  </div>

  <button onclick="checkIn()">
    CHECK-IN
  </button>

  <div id="status">
    READY
  </div>

</div>

<div id="success">

  <img
    id="profileImage"
    class="profileImage"
  >

  <div class="access">
    ACCESS GRANTED
  </div>

  <div
    id="welcomeName"
    class="name"
  >
  </div>

  <div class="welcome">
    BEAST TOKYOへ<br>
    ようこそ！
  </div>

  <div class="greenGlow"></div>

</div>

<script>

const LIFF_ID =
"2010098806-OYFyyTQp";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxLnd_ViToNbyAVAmAuZH8Xmchru_KFQhla9U3mqBGR7qzUMb3nDnwKtpc5mg1PHwq-Fw/exec";

async function main(){

  const status =
    document.getElementById("status");

  try{

    status.innerText =
      "CONNECTING...";

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

      status.innerText =
        "LINE LOGIN";

      liff.login();

      return;
    }

    status.innerText =
      "READY";

  }catch(e){

    status.innerText =
      "ERROR";

    console.error(e);
  }
}

async function checkIn(){

  const status =
    document.getElementById("status");

  status.innerText =
    "AUTHENTICATING...";

  try{

    const profile =
      await liff.getProfile();

    await fetch(
      GAS_URL,
      {
        method:"POST",

        body:JSON.stringify({

          userId:
            profile.userId,

          displayName:
            profile.displayName,

          checkInDate:
            new Date().toISOString()

        })
      }
    );

    document
      .getElementById("profileImage")
      .src =
        profile.pictureUrl;

    document
      .getElementById("welcomeName")
      .innerHTML =
        profile.displayName + "様";

    document
      .getElementById("success")
      .style.display =
        "flex";

    status.innerText =
      "CHECK-IN COMPLETE";

    setTimeout(()=>{

      liff.closeWindow();

    },3000);

  }catch(e){

    status.innerText =
      "ERROR";

    console.error(e);
  }
}

main();

</script>

</body>
</html>
