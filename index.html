<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEAST CHECK-IN</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#app{
  width:100%;
  max-width:560px;
  text-align:center;
  padding:40px;
  box-sizing:border-box;
}

.logo{
  font-size:54px;
  font-weight:900;
  letter-spacing:10px;
  white-space:nowrap;
  line-height:1;
}

.subLogo{
  margin-top:18px;
  color:#00ff88;
  font-size:22px;
  letter-spacing:9px;
  line-height:1;
}

#status{
  margin-top:90px;
  color:#aaa;
  font-size:22px;
  letter-spacing:3px;
  line-height:1.8;
}

.statusMain{
  color:#00ff88;
  font-size:30px;
  font-weight:900;
  letter-spacing:4px;
}

.statusSub{
  margin-top:18px;
  color:#fff;
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
  line-height:1.6;
}

.successWrap,
.friendWrap,
.errorWrap{
  animation:fadeIn .35s ease;
}

.profileImage{
  width:220px;
  height:220px;
  border-radius:50%;
  object-fit:cover;
  border:6px solid #00ff88;
  box-shadow:0 0 70px rgba(0,255,136,.9);
}

.successText{
  margin-top:34px;
  color:#00ff88;
  font-size:26px;
  letter-spacing:7px;
  line-height:1;
}

.userName{
  margin-top:30px;
  font-size:58px;
  font-weight:900;
  line-height:1.1;
}

.welcome{
  margin-top:30px;
  font-size:36px;
  line-height:1.45;
}

.friendTitle{
  margin-top:70px;
  color:#00ff88;
  font-size:30px;
  font-weight:900;
  letter-spacing:5px;
  line-height:1.4;
}

.friendText{
  margin-top:34px;
  font-size:24px;
  line-height:1.7;
  letter-spacing:2px;
}

.addFriendButton{
  display:inline-block;
  margin-top:46px;
  padding:22px 46px;
  background:#00ff88;
  color:#000;
  text-decoration:none;
  font-weight:900;
  font-size:26px;
  letter-spacing:4px;
  border-radius:6px;
  box-shadow:0 0 50px rgba(0,255,136,.65);
}

.errorText{
  color:#ff4444;
  font-size:26px;
  letter-spacing:5px;
  line-height:1.5;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div id="app">

  <div id="mainView">

    <div class="logo">
      BEAST TOKYO
    </div>

    <div class="subLogo">
      CHECK-IN SYSTEM
    </div>

    <div id="status">
      CONNECTING...
    </div>

  </div>

</div>

<script>

const LIFF_ID =
"2010098806-OYFyyTQp";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxBj9nknRvM-xGBKMolLz75yvOFPY0dKZXgvD-vvq9m565Vm326R32y4uv90Dm4V1VT/exec";

const ADD_FRIEND_URL =
"https://lin.ee/TJRjoQn";

async function main(){

  const status =
    document.getElementById("status");

  try{

    status.innerHTML =
      `
        <div class="statusMain">CONNECTING</div>
        <div class="statusSub">
          接続中です<br>
          そのままお待ちください
        </div>
      `;

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

      status.innerHTML =
        `
          <div class="statusMain">LOGIN</div>
          <div class="statusSub">
            LINEログイン中です<br>
            そのままお待ちください
          </div>
        `;

      liff.login();

      return;
    }

    status.innerHTML =
      `
        <div class="statusMain">CHECKING</div>
        <div class="statusSub">
          友だち追加状況を確認中です<br>
          そのままお待ちください
        </div>
      `;

    const friendship =
      await liff.getFriendship();

    if(!friendship.friendFlag){

      showAddFriend();

      return;
    }

    await autoCheckIn();

  }catch(e){

    showError();

    console.error(e);
  }
}

async function autoCheckIn(){

  const status =
    document.getElementById("status");

  try{

    status.innerHTML =
      `
        <div class="statusMain">CHECK-IN</div>
        <div class="statusSub">
          チェックイン中です<br>
          この画面のままお待ちください
        </div>
      `;

    const profile =
      await liff.getProfile();

    await fetch(GAS_URL,{

      method:"POST",

      mode:"no-cors",

      headers:{
        "Content-Type":
          "text/plain;charset=utf-8"
      },

      body:JSON.stringify({

        userId:
          profile.userId,

        displayName:
          profile.displayName,

        pictureUrl:
          profile.pictureUrl,

        checkInDate:
          new Date().toISOString()

      })
    });

    showSuccess(profile);

    setTimeout(()=>{

      liff.closeWindow();

    },3000);

  }catch(e){

    showError();

    console.error(e);
  }
}

function showSuccess(profile){

  const app =
    document.getElementById("app");

  app.innerHTML = `

    <div class="successWrap">

      <img
        class="profileImage"
        src="${profile.pictureUrl}"
      >

      <div class="successText">
        ACCESS GRANTED
      </div>

      <div class="userName">
        ${profile.displayName}様
      </div>

      <div class="welcome">
        BEAST TOKYOへ<br>
        ようこそ！
      </div>

    </div>
  `;
}

function showAddFriend(){

  const app =
    document.getElementById("app");

  app.innerHTML = `

    <div class="friendWrap">

      <div class="logo">
        BEAST TOKYO
      </div>

      <div class="subLogo">
        CHECK-IN SYSTEM
      </div>

      <div class="friendTitle">
        WELCOME TO BEAST
      </div>

      <div class="friendText">
        友だち追加後に<br>
        再度QRを読み込むと<br>
        初回来店ポイントGET
      </div>

      <a
        class="addFriendButton"
        href="${ADD_FRIEND_URL}"
        target="_blank"
      >
        友だち追加
      </a>

    </div>
  `;
}

function showError(){

  const app =
    document.getElementById("app");

  app.innerHTML = `

    <div class="errorWrap">

      <div class="errorText">
        CHECK-IN ERROR<br>
        STAFFにお声がけください
      </div>

    </div>
  `;
}

main();

</script>

</body>
</html>
